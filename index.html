<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pac Meme Starter</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: radial-gradient(circle at top, #1e293b, #020617 68%);
      font-family: "Trebuchet MS", Verdana, sans-serif;
      color: #e2e8f0;
    }

    .shell {
      width: 100%;
      max-width: 1320px;
      padding: 20px;
    }

    .title {
      margin: 0 0 10px;
      text-align: center;
      letter-spacing: 0.04em;
      font-size: 1.15rem;
      font-weight: 700;
    }

    #game-container {
      width: min(96vw, 1280px);
      aspect-ratio: 2 / 1;
      margin: 0 auto;
      outline: 2px solid #334155;
      box-shadow: 0 14px 30px rgba(0, 0, 0, 0.45);
    }

    #game-container canvas {
      width: 100% !important;
      height: 100% !important;
      display: block;
      image-rendering: pixelated;
    }

    .hint {
      margin: 10px 0 0;
      text-align: center;
      font-size: 0.9rem;
      opacity: 0.85;
    }

    @media (max-width: 760px) {
      .shell {
        padding: 12px;
      }

      #game-container {
        width: min(92vw, 640px);
      }
    }
  </style>
</head>
<body>
  <main class="shell">
    <h1 class="title">Pac Meme (Minimal Phaser Starter)</h1>
    <div id="game-container"></div>
    <p class="hint">Arrow keys to move, collect all dots, avoid the hunter.</p>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/phaser@3/dist/phaser.js"></script>
  <script src="js/scenes/BootScene.js"></script>
  <script src="js/scenes/GameScene.js"></script>
  <script src="js/main.js"></script>
</body>
</html>
